<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="104" fill="#0a0e1a"/>

  <!-- Activity ring: segmented circle (blue / green / amber) with gaps.
       Built from a single circle per colour using stroke-dasharray; the
       transform rotates each arc to its position (0 = 3 o'clock, clockwise).
       Circumference (r=150) = 942.4778. -->
  <g fill="none" stroke-width="30" stroke-linecap="round">
    <!-- Blue arc: right + bottom (3:30 -> 8 o'clock) -->
    <circle cx="256" cy="256" r="150" stroke="#5e6ef5" stroke-dasharray="348.72 593.76" transform="rotate(10.8 256 256)"/>
    <!-- Amber arc: bottom-left (~8 o'clock) -->
    <circle cx="256" cy="256" r="150" stroke="#f5a623" stroke-dasharray="65.97 876.51" transform="rotate(154.8 256 256)"/>
    <!-- Blue arc: left (9 -> 11 o'clock) -->
    <circle cx="256" cy="256" r="150" stroke="#5e6ef5" stroke-dasharray="188.50 753.98" transform="rotate(187.2 256 256)"/>
    <!-- Green arc: top-right (12 -> 2:30) -->
    <circle cx="256" cy="256" r="150" stroke="#1fd87a" stroke-dasharray="169.65 772.83" transform="rotate(277.2 256 256)"/>
  </g>

  <!-- Heartbeat / ECG pulse -->
  <path d="M150 256 H206 L222 224 L240 300 L258 196 L274 280 L290 256 H362"
        fill="none" stroke="#6366f1" stroke-width="17"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
